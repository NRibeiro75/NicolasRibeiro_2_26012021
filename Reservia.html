<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/ee77c798a3.js"></script>
    <link rel="stylesheet" href="CSS/styles.css">
    <title>Reservia</title>
</head>

<body>

    <!--Header-->
    <header class="header">

        <!--Navigation-->
        <nav class="navigation">
            <a href="#" class="logo" title="Reservia">
                <img src="images/logo/reservia.svg" alt="Logo reservia" width="97" height="45" />
            </a>

            <ul class="menu">
                <li><a href="hebergements" title="Hebergements">Hebergements</a></li>
                <li><a href="Activités" title="Activités">Activités</a></li>
            </ul>

            <div class="inscrire">
                <a href="#" title="S'inscrire">S'inscrire</a>
            </div>
        </nav>

        <!--Barre de recherche-->
        <div class="recherche">
            <h1>Trouver votre hébergement pour des vacances de rêve</h1>
            <span>En plein centre ville ou en pleine nature</span>

            <i class="fas fa-map-marker-alt"></i>
            <label for="site-search"></label>
            <input type="search" id="search" placeholder="Recherche" name="search" aria-label="recherche">
            <button type="button">
                <i class="fas fa-search"></i>
                <span class="rechercher">Rechercher</span>
            </button>
        </div>
        <!--Filtres-->
        <div class="filtres">
            <p id="filtres">Filtres</p>

            <input type="checkbox" id="switch" />
            <label for="switch" class="eco"><span>Economique</span></label>

            <input type="checkbox" id="switch1" />
            <label for="switch1" class="fam">Familial</label>

            <input type="checkbox" id="switch2" />
            <label for="switch2" class="rom">Romantique</label>

            <input type="checkbox" id="switch3" />
            <label for="switch3" class="dog">Animaux Autorisés</label>
        </div>

        <!--info-->
        <p><i class="fas fa-info"></i> Plus de 500 logements sont disponibles dans cette ville</p>

    </header>
    <!--/Header-->

    <!--Main-->
    <!--Hebergements-->
    <!--Populaires-->
    <!--Activités-->
    <!--/Main-->

    <!--Footer-->
</body>

</html>
